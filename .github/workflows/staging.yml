name: Staging Deployment

on:
    push:
        branches:
            - staging

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: '20'

          - name: Install & Build
            run: |
                cd wp-content/themes/wordpress
                npm install
                npm run build

          - name: SSH
            uses: easedigital/rsync-deploy-action@v1
            with:
                ssh-key: ${{ secrets.SSH_KEY }}
                remote-user: ${{ secrets.USER }}
                remote-host: ${{ secrets.HOST }}
                local-path: ./wp-content/themes/wordpress/
                remote-path: /var/www/html/wp-content/themes/wordpress/
                options: --delete --exclude='.git*' --exclude='docker-compose.yml' --exclude='node_modules' --exclude='src'