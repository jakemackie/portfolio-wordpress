name: Staging Deployment

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wp-content/themes/wordpress/package-lock.json

      - name: Install & Build
        run: |
          cd wp-content/themes/wordpress
          npm ci
          npm run build

      - name: Deploy via Rsync
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete --exclude='node_modules' --exclude='package.json' --exclude='package-lock.json' --exclude='tsconfig.json' --exclude='blocks/src'
          path: ./wp-content/themes/wordpress/
          remote_path: /var/www/html/wp-content/themes/wordpress/
          remote_host: ${{ secrets.HOST }}
          remote_user: ${{ secrets.USER }}
          remote_key: ${{ secrets.SSH_KEY }}